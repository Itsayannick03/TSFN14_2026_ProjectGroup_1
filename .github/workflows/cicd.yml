name: Build and push to ACR

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  IMAGE_NAME: hair-salon

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # add Node.js setup 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'  # or your Node version
          cache: 'npm'

      - name: Install dependencies
        run: npm ci  # or npm install

      # run all tests
      - name: Run tests
        run: npm test  # This will run all 10 tests
        env:
          NODE_ENV: test

      # only build and push if tests pass
      - name: Set up Docker Buildx
        if: success()
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        if: success()
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        if: success()
        uses: docker/build-push-action@v6
        with:
          context: ./
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:1.0
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
