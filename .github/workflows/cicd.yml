name: Backend CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths: [ 'Backend/**', '.github/workflows/cicd.yml' ]
  pull_request:
    branches: [ main ]
    paths: [ 'Backend/**', '.github/workflows/cicd.yml' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        working-directory: Backend
        run: npm ci

      - name: Run backend tests
        working-directory: Backend
        run: npm test

  build-and-deploy:
    name: Build and Deploy to AKS
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4

      - name: Docker Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        run: |
         docker build -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/backend-app:${{ github.sha }} .
         docker build -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/backend-app:latest .
         docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/backend-app:${{ github.sha }}
         docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/backend-app:latest

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Deploy to AKS
        run: |
          sed -i "s|image:.*|image: ${{ secrets.REGISTRY_LOGIN_SERVER }}/backend-app:${{ github.sha }}|g" kubernetes/backend-deployment.yaml
          kubectl apply -f kubernetes/backend-deployment.yaml
          kubectl apply -f kubernetes/backend-service.yaml
          kubectl rollout status deployment/backend-deployment
